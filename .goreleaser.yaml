# .goreleaser.yaml
version: 2

project_name: bgp-stream

before:
  hooks:
    - go mod tidy

builds:
  - id: bgp-viewer-amd64
    main: ./cmd/bgp-viewer
    binary: bgp-viewer
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -tags=ebitengine

  - id: bgp-viewer-arm64
    main: ./cmd/bgp-viewer
    binary: bgp-viewer
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
      - PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -tags=ebitengine

  - id: bgp-viewer-windows-amd64
    main: ./cmd/bgp-viewer
    binary: bgp-viewer
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -tags=ebitengine

  - id: bgp-data-fetcher-amd64
    main: ./cmd/bgp-data-fetcher
    binary: bgp-data-fetcher
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64

  - id: bgp-data-fetcher-arm64
    main: ./cmd/bgp-data-fetcher
    binary: bgp-data-fetcher
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64

  - id: bgp-data-fetcher-windows-amd64
    main: ./cmd/bgp-data-fetcher
    binary: bgp-data-fetcher
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
